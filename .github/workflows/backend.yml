name: Spring Deploy

on:
  push:
    branches: [ develop ]

jobs:
  build:
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build -x test

      - name: Rename jar
        run: |
          cp build/libs/teamo-server-0.0.1-SNAPSHOT.jar /opt/app/app.jar

      - name: Restart Spring
        run: |
          sudo systemctl restart app.service