name: Spring Deploy

on:
  push:
    branches: [ develop ]

jobs:
  build:
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build -x test

	  - name: Rename jar
		run: |
		  sudo mkdir -p /opt/app
		  JAR=$(ls build/libs/*.jar | grep -v plain | head -n 1)
		  sudo cp $JAR /opt/app/app.jar

      - name: Restart Spring
        run: |
          sudo systemctl restart app.service